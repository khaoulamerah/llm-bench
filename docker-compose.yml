services:
  ollama:
    image: ollama/ollama:latest
    container_name: llm-bench-ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_models:/root/.ollama
    networks:
      - llm-net
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  app:
    build: ./app
    container_name: llm-bench-app
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=${OLLAMA_HOST:-http://ollama:11434}
    volumes:
      - ./data:/app/data
      - ./results:/app/results
      - ./app:/app
    networks:
      - llm-net
    restart: on-failure

networks:
  llm-net:
    driver: bridge

volumes:
  ollama_models: